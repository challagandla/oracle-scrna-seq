name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python -m pip install ruff==0.15.17
      - name: Lint with ruff
        run: ruff check --select E4,E7,E9,F,B --output-format=github scripts/ tests/

  validation:
    name: Tests and workflow smoke run
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          activate-environment: scrna
          environment-file: envs/scrna.yaml
          auto-activate-base: false
          use-mamba: true

      - name: Run regression tests
        shell: bash -el {0}
        run: |
          set -euo pipefail
          conda activate scrna
          python -m pytest tests/ -v --tb=short

      - name: Generate tiny inputs and validate the DAG
        shell: bash -el {0}
        run: |
          set -euo pipefail
          conda activate scrna
          export MPLBACKEND=Agg
          export NUMBA_CACHE_DIR="${RUNNER_TEMP}/numba-cache"
          export MPLCONFIGDIR="${RUNNER_TEMP}/matplotlib"
          python tests/create_tiny_inputs.py --out .test/data
          snakemake \
            --snakefile workflow/Snakefile \
            --configfile tests/fixtures/smoke_config.yaml \
            --cores 2 \
            --dry-run \
            --printshellcmds

      - name: Run the tiny workflow end to end
        shell: bash -el {0}
        run: |
          set -euo pipefail
          conda activate scrna
          export MPLBACKEND=Agg
          export NUMBA_CACHE_DIR="${RUNNER_TEMP}/numba-cache"
          export MPLCONFIGDIR="${RUNNER_TEMP}/matplotlib"
          snakemake \
            --snakefile workflow/Snakefile \
            --configfile tests/fixtures/smoke_config.yaml \
            --cores 2 \
            --rerun-incomplete \
            --printshellcmds \
            --show-failed-logs
          test -s .test/results/merged/08_annotate/annotated.h5ad
          test -s .test/results/merged/07_markers/pseudobulk_status.csv
          test -d .test/results/merged/07_markers/DE
          test -s .test/results/merged/08_annotate/marker_coverage.csv
          test -s .test/results/report.html
          test -s .test/results/run_config.yaml
          test -s .test/results/run_manifest.json
          test -s .test/results/multiqc/multiqc_report.html
