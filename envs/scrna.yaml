name: scrna
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip

  # ── Core scientific stack ───────────────────────────────────
  - numpy>=1.26
  - scipy>=1.12
  - pandas>=2.1
  - matplotlib>=3.8
  - seaborn>=0.13
  - statsmodels>=0.14

  # ── AnnData / scanpy ecosystem ──────────────────────────────
  - anndata>=0.10
  - scanpy>=1.10
  - leidenalg>=0.10
  - igraph>=0.11
  - python-igraph

  # ── HDF5 / IO ────────────────────────────────────────────────
  - h5py>=3.10
  - hdf5

  # ── Snakemake ────────────────────────────────────────────────
  - snakemake-minimal>=8.0
  - snakemake-executor-plugin-cluster-generic

  # ── pip-only packages ────────────────────────────────────────
  - pip:
    # QC
    - scrublet>=0.2.3

    # Batch correction
    - harmonypy>=0.0.9

    # Differential expression
    - pydeseq2>=0.4.9

    # Cell type annotation
    - celltypist>=1.6.3

    # Trajectory
    - scvelo>=0.3.2

    # Plotting extras
    - plotly>=5.20
    - kaleido>=0.2         # plotly static export

    # Utilities
    - tqdm>=4.66
    - rich>=13.7
    - click>=8.1
    - pyyaml>=6.0
